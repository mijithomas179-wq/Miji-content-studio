Version évoluée : application installable + backend + génération vidéo automatique

OBJECTIF:

Site hébergé (lien public)

App installable (PWA)

Génération vidéo automatique (texte → vidéo) */


import { useState, useEffect } from "react"; import { Card, CardContent } from "@/components/ui/card"; import { Button } from "@/components/ui/button"; import { Textarea } from "@/components/ui/textarea";

export default function MijiContentStudio() { const [input, setInput] = useState(""); const [output, setOutput] = useState(null); const [installPrompt, setInstallPrompt] = useState(null);

useEffect(() => { const handler = (e) => { e.preventDefault(); setInstallPrompt(e); }; window.addEventListener("beforeinstallprompt", handler); return () => window.removeEventListener("beforeinstallprompt", handler); }, []);

const installApp = async () => { if (!installPrompt) return; installPrompt.prompt(); await installPrompt.userChoice; setInstallPrompt(null); };

// ========================= // FRONTEND CALL BACKEND API // ========================= async function generateVideo() { const res = await fetch("https://YOUR_BACKEND_URL/api/generate", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ prompt: input }) });

const data = await res.json();
setOutput(data);

}

function copy(text) { navigator.clipboard.writeText(text); }

return ( <div className="p-6 max-w-4xl mx-auto space-y-6"> <h1 className="text-2xl font-bold">Miji Content Studio PRO</h1>

{installPrompt && (
    <Button onClick={installApp}>Installer l’application</Button>
  )}

  <Card>
    <CardContent className="p-4 space-y-3">
      <Textarea
        placeholder="Entre ton idée (discipline, foi, business...)"
        value={input}
        onChange={(e) => setInput(e.target.value)}
      />

      <Button onClick={generateVideo}>
        Générer vidéo automatique
      </Button>
    </CardContent>
  </Card>

  {output && (
    <Card>
      <CardContent className="p-4 space-y-2">
        <h2 className="font-bold">Résultat vidéo</h2>
        <p>Lien vidéo : {output.videoUrl}</p>
        <Button onClick={() => copy(output.videoUrl)}>
          Copier lien
        </Button>
      </CardContent>
    </Card>
  )}
</div>

); }

